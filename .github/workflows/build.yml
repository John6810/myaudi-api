name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update GitOps repo
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          SHA_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          git clone https://x-access-token:${GH_TOKEN}@github.com/John6810/argocd-apps.git gitops
          cd gitops
          sed -i "s|image: ghcr.io/john6810/myaudi-api:.*|image: ghcr.io/john6810/myaudi-api:${SHA_TAG}|" apps/myaudi-api/deployment.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || (git commit -m "chore: update myaudi-api image to ${SHA_TAG}" && git push)
