name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands or actions to reproduce the issue.
      render: bash
      placeholder: python main.py status --brief -v

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead.

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Run with `-v` and paste the output (redact credentials).
      render: text

  - type: dropdown
    id: api-level
    attributes:
      label: API level
      options:
        - "1 (CARIAD — new)"
        - "0 (MBB — legacy)"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 15"
