name: Feature request
description: Suggest a new feature
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: A clear description of the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why?
      description: What problem does it solve or what use case does it enable?

  - type: textarea
    id: implementation
    attributes:
      label: Possible implementation
      description: Any ideas on how to build it (optional).

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - CLI
        - REST API
        - Both
        - Other
